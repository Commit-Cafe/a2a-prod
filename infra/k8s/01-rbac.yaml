# ============================================================
# ServiceAccount + Role + RoleBinding
# 详见 SPEC §3.10.5 / ADR-0010
#
# 设计原则：每个 workload 独立 SA + 最小权限
# ============================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: orchestrator
automountServiceAccountToken: false  # 默认服务不需要 API server
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: glm-agent
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: agent
    a2a-prod.io/agent: glm-agent
automountServiceAccountToken: false
---
