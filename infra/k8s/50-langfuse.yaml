# ============================================================
# Langfuse v3 自托管 6 组件（web / worker / postgres / clickhouse / redis / minio）
# 详见 SPEC §3.8 / §3.10.3
#
# 注：Langfuse 官方提供了 helm chart（https://langfuse.com/docs/deployment/self-host）
# 本文件保留 Kustomize 风格，理由：
#   1. 与本项目其他组件保持同一管理工具
#   2. 简化本地 minikube 验证
#   3. 避免引入 helm 依赖
# ============================================================
---
# ---------------- Postgres (OLTP) ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-postgres
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate  # 单实例 + PVC，不能 RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: langfuse
        app.kubernetes.io/name: langfuse-postgres
    spec:
      serviceAccountName: langfuse-web
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:17
          imagePullPolicy: IfNotPresent
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: POSTGRES_PASSWORD
            - name: TZ
              value: UTC
            - name: PGTZ
              value: UTC
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30  # 5min 宽限
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-postgres
spec:
  type: ClusterIP
  ports:
    - name: pg
      port: 5432
      targetPort: pg
  selector:
    app.kubernetes.io/name: langfuse-postgres
---
# ---------------- ClickHouse (OLAP) ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-clickhouse
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-clickhouse
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/component: langfuse
        app.kubernetes.io/name: langfuse-clickhouse
    spec:
      serviceAccountName: langfuse-web
      terminationGracePeriodSeconds: 30
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8123
            - name: tcp
              containerPort: 9000
          env:
            - name: CLICKHOUSE_DB
              value: default
            - name: CLICKHOUSE_USER
              value: clickhouse
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            - name: TZ
              value: UTC
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-clickhouse-data
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-clickhouse
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-clickhouse
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: tcp
      port: 9000
      targetPort: tcp
  selector:
    app.kubernetes.io/name: langfuse-clickhouse
---
# ---------------- Redis ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-redis
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: langfuse
        app.kubernetes.io/name: langfuse-redis
    spec:
      serviceAccountName: langfuse-web
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--save", "60", "1"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: REDIS_PASSWORD
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-redis
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: langfuse-redis
---
# ---------------- MinIO ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-minio
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/component: langfuse
        app.kubernetes.io/name: langfuse-minio
    spec:
      serviceAccountName: langfuse-web
      terminationGracePeriodSeconds: 30
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: S3_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: S3_SECRET_ACCESS_KEY
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-minio
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-minio
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
  selector:
    app.kubernetes.io/name: langfuse-minio
---
# ---------------- Langfuse Web ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-web
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-web
    app.kubernetes.io/version: "3.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-web
  template:
    metadata:
      labels:
        app.kubernetes.io/component: langfuse
        app.kubernetes.io/name: langfuse-web
        app.kubernetes.io/version: "3.0.0"
    spec:
      serviceAccountName: langfuse-web
      terminationGracePeriodSeconds: 30
      containers:
        - name: langfuse-web
          image: langfuse/langfuse:3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: langfuse-web-env
          env:
            - name: LANGFUSE_INIT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: LANGFUSE_INIT_USER_PASSWORD
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: LANGFUSE_INIT_PROJECT_SECRET_KEY
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: NEXTAUTH_SECRET
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: POSTGRES_PASSWORD
            # DATABASE_URL 含密码，K8s ConfigMap 不支持变量展开，必须从 Secret 注入
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: REDIS_URL
          startupProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-web
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app.kubernetes.io/name: langfuse-web
---
# ---------------- Langfuse Worker ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-worker
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    app.kubernetes.io/name: langfuse-worker
    app.kubernetes.io/version: "3.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: langfuse
        app.kubernetes.io/name: langfuse-worker
        app.kubernetes.io/version: "3.0.0"
    spec:
      serviceAccountName: langfuse-web
      terminationGracePeriodSeconds: 60
      containers:
        - name: langfuse-worker
          image: langfuse/langfuse-worker:3
          imagePullPolicy: IfNotPresent
          # Worker 没有 HTTP 端点；用 exec 探针
          # kill -0 <pid> 检查进程存活（兼容 sh 镜像）
          startupProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: langfuse-web-env
          env:
            - name: LANGFUSE_INIT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: LANGFUSE_INIT_USER_PASSWORD
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: LANGFUSE_INIT_PROJECT_SECRET_KEY
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: NEXTAUTH_SECRET
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: POSTGRES_PASSWORD
            # DATABASE_URL / REDIS_URL 含密码，必须从 Secret 注入
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: a2a-prod-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
