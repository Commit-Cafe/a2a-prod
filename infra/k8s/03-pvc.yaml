# ============================================================
# PersistentVolumeClaim 列表
# 详见 SPEC §3.10.4
#
# 仅 Langfuse 子组件需要持久化（Postgres / ClickHouse / MinIO）；
# LiteLLM / 3 Agent / Orchestrator / MCP server / Open WebUI 是无状态服务
# ============================================================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-postgres-data
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    a2a-prod.io/storage: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-clickhouse-data
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    a2a-prod.io/storage: clickhouse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi  # trace OLAP 数据量大
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-minio-data
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: langfuse
    a2a-prod.io/storage: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: a2a-prod
  labels:
    app.kubernetes.io/component: open-webui
    a2a-prod.io/storage: open-webui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

# ============================================================
# workspace 共享卷（mcp-filesystem 写 / mcp-shell 读）
# B2 修复（GLM 2026-06-18 review）：MCP server 启动时 WORKSPACE_ROOT=/workspace
# 但 readOnlyRootFilesystem=true 且无 PVC 挂载 → write_file / run_command 全部 OSError。
# 注：mcp-filesystem / mcp-shell 都配 replicas=1（RWO 即可，无需 RWX）。
# ============================================================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: a2a-prod-workspace
  namespace: a2a-prod
  labels:
    app.kubernetes.io/part-of: a2a-prod
    a2a-prod.io/storage: workspace
spec:
  accessModes:
    - ReadWriteOnce  # mcp-filesystem 单独写 / mcp-shell 单独读（K8s 单 Pod RWO 即可）
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
